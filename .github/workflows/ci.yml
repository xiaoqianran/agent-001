name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test-and-regression:
    name: test + regression
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Stub LLM only — do not inject NEWAPI_* or any model secrets
    env:
      CI: true
      # Explicitly unset live LLM (default is Stub when GSS_LLM is not 1)
      GSS_LLM: "0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Unit / integration tests
        run: pnpm test

      - name: Multi-scenario regression smoke
        run: pnpm regression
